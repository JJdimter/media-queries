<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Car Store</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="container">

    <nav class="navbar">
        <div class="logo">
            🚗 Electric Cars
        </div>

        <div class="menu-desktop">
            <a href="#">Inicio</a>
            <a href="#">Catálogo</a>
            <a href="#">Ofertas</a>
            <a href="#">Contacto</a>
        </div>

        <div class="menu-mobile">
            ☰
        </div>
    </nav>

    <section class="filtros">
        <label>Ordenar por:</label>
        <select>
            <option>Precio</option>
            <option>Marca</option>
            <option>Año</option>
        </select>
    </section>

    <main class="principal">

        <div class="card">
            <img src="https://picsum.photos/300/200" alt="">
            <h3>Tesla Model 3</h3>
            <button>Ver más</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/201" alt="">
            <h3>BMW i4</h3>
            <button>Ver más</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/202" alt="">
            <h3>Hyundai Ioniq 5</h3>
            <button>Ver más</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/203" alt="">
            <h3>Kia EV6</h3>
            <button>Ver más</button>
        </div>

    </main>

    <footer class="footer">
        <p>© 2026 Electric Car Store</p>
    </footer>

</div>

</body>
</html>
